name: Run Tests
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'Javascript/**'
  pull_request:
    paths:
      - 'Javascript/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          package_json_file: Javascript/package.json

      - name: Install dependencies
        working-directory: ./Javascript
        run: pnpm install --frozen-lockfile

      - name: Run linting
        working-directory: ./Javascript
        run: pnpm lint

      - name: Type check
        working-directory: ./Javascript
        run: pnpm type-check

      - name: Build project
        working-directory: ./Javascript
        run: pnpm build

      - name: Run tests
        working-directory: ./Javascript
        run: pnpm test:run
